<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">KeyHub Desktop 工作流程</title>
  <desc id="desc">从本机项目与密钥库，经环境变量映射，连接到本机进程和远程服务器。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8f7f1"/><stop offset="1" stop-color="#e5f3ef"/></linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#123d38"/><stop offset="1" stop-color="#0b8e80"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#163d38" flood-opacity=".12"/></filter>
  </defs>
  <rect width="1200" height="480" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="34" font-weight="700" fill="#132724">密钥不再散落，项目直接可用</text>
  <text x="60" y="106" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#60736f">密钥只保存一次，项目通过映射使用；需要时再启动、导出或部署。</text>
  <g filter="url(#shadow)">
    <rect x="60" y="152" width="270" height="250" rx="22" fill="#fffdf9" stroke="#d6e3df"/>
    <rect x="465" y="138" width="270" height="278" rx="26" fill="url(#hero)"/>
    <rect x="870" y="152" width="270" height="250" rx="22" fill="#fffdf9" stroke="#d6e3df"/>
  </g>
  <circle cx="108" cy="202" r="24" fill="#dff3ee"/><path d="M99 193h18v18H99zM103 188h10v5h-10z" fill="none" stroke="#0b8e80" stroke-width="3"/>
  <text x="145" y="198" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#18302c">本机输入</text>
  <text x="92" y="247" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#425955">API Key / Token</text>
  <text x="92" y="282" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#425955">SSH 私钥 / 证书</text>
  <text x="92" y="317" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#425955">.env 与项目清单</text>
  <text x="92" y="352" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#425955">本机项目与服务器</text>
  <circle cx="600" cy="207" r="42" fill="#ffffff22" stroke="#ffffff55" stroke-width="2"/><path d="M585 204v-8a15 15 0 0 1 30 0v8m-36 0h42v33h-42z" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  <text x="600" y="282" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="25" font-weight="700" fill="white">KeyHub Desktop</text>
  <text x="600" y="317" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="16" fill="#d7f4ef">DPAPI 加密 · 环境映射 · 操作记录</text>
  <rect x="520" y="346" width="160" height="36" rx="18" fill="#ffffff20"/><text x="600" y="370" text-anchor="middle" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="15" fill="white">不要求项目接 SDK</text>
  <circle cx="918" cy="202" r="24" fill="#fff0dd"/><path d="M907 207h22m-17-10 6-6 6 6m-6-6v25" fill="none" stroke="#df7700" stroke-width="3" stroke-linecap="round"/>
  <text x="955" y="198" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="21" font-weight="700" fill="#18302c">使用方式</text>
  <text x="902" y="247" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#425955">启动项目并注入环境变量</text>
  <text x="902" y="282" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#425955">显式导出 .env / JSON</text>
  <text x="902" y="317" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#425955">通过 SSH 部署配置</text>
  <text x="902" y="352" font-family="Segoe UI, Microsoft YaHei, sans-serif" font-size="17" fill="#425955">打开前端与查看运行状态</text>
  <path d="M350 277h84m-16-12 16 12-16 12M756 277h84m-16-12 16 12-16 12" fill="none" stroke="#65a99e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
